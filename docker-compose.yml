volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  dzcash:
    name: dzcash
    driver: bridge

services:
  # ============ Core Services ============
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dzuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-dzcash}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dzcash
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dzuser -d dzcash"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.5

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - dzcash
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5

  # ============ Monitoring Stack ============
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: dzcash_prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - dzcash

  grafana:
    image: grafana/grafana:11.1.0
    container_name: dzcash_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/dzcash-platform.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    cpus: 0.3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - dzcash

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: dzcash_node_exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - "9100"
    networks:
      - dzcash

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: dzcash_postgres_exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://dzuser:${POSTGRES_PASSWORD}@postgres:5432/dzcash?sslmode=disable"
    expose:
      - "9187"
    networks:
      - dzcash

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: dzcash_redis_exporter
    restart: always
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - "9121"
    networks:
      - dzcash

  loki:
    image: grafana/loki:3.1.0
    container_name: dzcash_loki
    restart: always
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    expose:
      - "3100"
    networks:
      - dzcash

  promtail:
    image: grafana/promtail:3.1.0
    container_name: dzcash_promtail
    restart: always
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - dzcash
    depends_on:
      loki:
        condition: service_started

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: dzcash_alertmanager
    restart: always
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    expose:
      - "9093"
    networks:
      - dzcash

  nginx:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: dzcash_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf
      - ./nginx/modsecurity.conf:/etc/modsecurity.d/local.conf
      - ./nginx/ssl:/etc/nginx/ssl
    environment:
      MODSEC_RULE_ENGINE: "on"
      MODSEC_REQ_BODY_ACCESS: "on"
      PARANOIA: "1"
    depends_on:
      backend:
        condition: service_started
        required: false
      frontend:
        condition: service_started
        required: false
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3
    mem_limit: 128m
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - dzcash
