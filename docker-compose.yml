version: '3.8'

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  dzcash:
    driver: bridge

services:
  # ============ Core Services ============
  postgres:
    image: postgres:15-alpine
    container_name: dzcash_postgres
    restart: always
    environment:
      POSTGRES_USER: dzuser
      POSTGRES_PASSWORD: dzpass
      POSTGRES_DB: dzcash
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dzcash
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dzuser -d dzcash"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dzcash_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dzcash
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ Application ============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dzcash_backend
    restart: always
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      APP_VERSION: 1.0.0
      DATABASE_URL: postgresql://dzuser:dzpass@postgres:5432/dzcash?schema=public
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-this-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-secret-jwt-refresh-key-change-this-in-production}
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@dzcash.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-DZCASH}
      CPX_SECRET: ${CPX_SECRET:-cpx_secret_key}
      OFFERTORO_SECRET: ${OFFERTORO_SECRET:-offertoro_secret_key}
      VPN_API_MOCK: ${VPN_API_MOCK:-true}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dzcash
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.backend.loadbalancer.server.port=4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dzcash_frontend
    restart: always
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - dzcash

  nginx:
    image: nginx:alpine
    container_name: dzcash_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - dzcash

  # ============ Monitoring Stack ============
  prometheus:
    image: prom/prometheus:latest
    container_name: dzcash_prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - dzcash

  grafana:
    image: grafana/grafana:latest
    container_name: dzcash_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/dzcash-platform.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - dzcash

  node-exporter:
    image: prom/node-exporter:latest
    container_name: dzcash_node_exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - dzcash
