groups:
  - name: dzcash
    interval: 30s
    rules:
      - alert: BackendDown
        expr: up{job="dzcash-backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Backend is down"
          description: "Backend service has been unreachable for over 1 minute."

      - alert: HighErrorRate
        expr: rate(http_requests_duration_seconds_count{status=~"5.."}[5m]) / rate(http_requests_duration_seconds_count[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High error rate on backend"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighRiskUser
        expr: dzcash_user_risk_score > 80
        for: 10m
        labels:
          severity: warning
          service: fraud
        annotations:
          summary: "High risk user detected"
          description: "A user has a risk score above 80."

      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "PostgreSQL is down"
          description: "Database has been unreachable for over 1 minute."

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          service: cache
        annotations:
          summary: "Redis is down"
          description: "Redis has been unreachable for over 1 minute."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "Low disk space"
          description: "Disk usage is above 90% on the root filesystem."
