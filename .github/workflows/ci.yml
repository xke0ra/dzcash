name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  backend-lint-test:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: dzuser
          POSTGRES_PASSWORD: dzpass
          POSTGRES_DB: dzcash_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://dzuser:dzpass@localhost:5433/dzcash_test?schema=public

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://dzuser:dzpass@localhost:5433/dzcash_test?schema=public

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit
        env:
          DATABASE_URL: postgresql://dzuser:dzpass@localhost:5433/dzcash_test?schema=public
          JWT_SECRET: test-secret
          VPN_API_MOCK: 'true'

      - name: Build
        run: npm run build

  frontend-lint-test:
    name: Frontend - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  e2e-tests:
    name: E2E - Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./e2e

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: dzuser
          POSTGRES_PASSWORD: dzpass
          POSTGRES_DB: dzcash_test
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./e2e/package-lock.json

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          cd ../backend
          npm ci
          npx prisma generate
          echo "DATABASE_URL=postgresql://dzuser:dzpass@localhost:5433/dzcash_test?schema=public" > .env
          npm run start:dev &
          sleep 10

      - name: Start frontend
        run: |
          cd ../frontend
          npm ci
          npm run dev &
          sleep 10

      - name: Run E2E tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: ./e2e/playwright-report/
          retention-days: 7

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t dzcash-backend:test ./backend

      - name: Build frontend image
        run: docker build -t dzcash-frontend:test ./frontend
