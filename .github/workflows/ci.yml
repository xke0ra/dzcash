name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  backend-lint-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run build
      - run: pnpm test

  frontend-lint-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build
      - run: pnpm test

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test-build, frontend-lint-test-build]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [docker-build]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: dzuser
          POSTGRES_PASSWORD: dzpass
          POSTGRES_DB: dzcash
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
        working-directory: backend
      - run: npx prisma generate && npx prisma migrate deploy
        working-directory: backend
        env:
          DATABASE_URL: postgresql://dzuser:dzpass@postgres:5432/dzcash?schema=public
      - name: Start backend
        run: |
          pnpm run start &
          sleep 5
        working-directory: backend
        env:
          DATABASE_URL: postgresql://dzuser:dzpass@postgres:5432/dzcash?schema=public
          REDIS_URL: redis://redis:6379/0
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-jwt-refresh-secret
          PORT: 4000
      - name: Start frontend
        run: |
          pnpm run start &
          sleep 10
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
      - name: Run Playwright tests
        run: |
          pnpm install --frozen-lockfile
          npx playwright install chromium
          npx playwright test
        working-directory: e2e
        env:
          BASE_URL: http://localhost:3000
