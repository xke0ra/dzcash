# ModSecurity configuration
SecRuleEngine On
SecRequestBodyAccess On
SecResponseBodyAccess Off
SecRequestBodyLimit 13107200
SecRequestBodyInMemoryLimit 13107200

# Turn off some noisy rules
SecRuleRemoveById 910100 910110 910120 920120 920170 920210 920220 920230 920240 920250 920260 920270 920280 920290 920310 920320 920330 920340 920350 920360 920370 920380 920440 920460 920470 921110 921120 921130 921140 921150 921151 921160 921170 921180 921190 921200 921210 931130 931140 942120 942130 942140 942150 942160 942170 942180 942190 942200 942210 942220 942230 942240 942250 942260 942270 942280 942290 942300 942310 942320 942330 942340 942350 942360 942370 942380 942390 942400 942410 942420 942430 942440 942450 942460 942470 942480 942490 942500 942510 942520 942530 942540

# Exclude health check endpoints
SecRule REQUEST_URI "@beginsWith /api/health" "id:1000,phase:1,pass,nolog,ctl:ruleEngine=Off"

# Rate limiting for API
SecAction "id:1001,phase:1,pass,nolog,setvar:tx.allowed_request_content_type=application/json|application/x-www-form-urlencoded|multipart/form-data|text/xml|application/xml"
